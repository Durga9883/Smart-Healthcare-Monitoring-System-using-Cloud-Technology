<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Alerts – Smart Healthcare Monitoring System</title>
  <meta name="description" content="Emergency health alerts — view and resolve critical patient notifications."/>
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🏥</div>
      <div><h2>SmartHealth<span>Monitor</span></h2></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item" href="/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a class="nav-item" href="/patients"><span class="nav-icon">🧑‍⚕️</span> Patients</a>
      <a class="nav-item active" href="/alerts"><span class="nav-icon">🚨</span> Alerts <span class="nav-badge" id="sidebar-alert-count">0</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="user-avatar">A</div>
        <div>
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">⏻ Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-title">🚨 Emergency Alerts</div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="loadAlerts()">↻ Refresh</button>
      </div>
    </header>

    <main class="page-content">

      <!-- Summary row -->
      <div class="stat-grid" style="margin-bottom:24px;">
        <div class="stat-card" style="--stat-color:#ef4444;--stat-bg:rgba(239,68,68,0.12)">
          <div class="stat-icon">🚨</div>
          <div><div class="stat-value" id="count-critical">—</div><div class="stat-label">Critical Alerts</div></div>
        </div>
        <div class="stat-card" style="--stat-color:#f59e0b;--stat-bg:rgba(245,158,11,0.12)">
          <div class="stat-icon">⚠️</div>
          <div><div class="stat-value" id="count-warning">—</div><div class="stat-label">Warning Alerts</div></div>
        </div>
        <div class="stat-card" style="--stat-color:#10b981;--stat-bg:rgba(16,185,129,0.12)">
          <div class="stat-icon">✅</div>
          <div><div class="stat-value" id="count-resolved">—</div><div class="stat-label">Resolved Today</div></div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm"  id="filter-all"      onclick="setFilter('all',this)">All Active</button>
        <button class="btn btn-outline btn-sm" id="filter-critical"  onclick="setFilter('critical',this)">🔴 Critical</button>
        <button class="btn btn-outline btn-sm" id="filter-warning"   onclick="setFilter('warning',this)">🟡 Warning</button>
      </div>

      <!-- Alert list -->
      <div id="alerts-container">
        <div class="empty-state"><div class="empty-icon">✅</div><p>Loading alerts…</p></div>
      </div>

    </main>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/alerts.js"></script>
</body>
</html>
